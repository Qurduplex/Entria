<div id="forgotPasswordModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 px-4 py-10 backdrop-blur-sm">
    <div class="w-full max-w-[1000px] rounded-[32px] bg-[#0F1016] px-[44px] py-[40px] shadow-[0_0_80px_rgba(0,0,0,0.45)]">
        <div class="mx-auto w-full max-w-[720px]">
            <h2 class="text-[56px] font-[Fraunces] font-semibold leading-none text-white">
                Nie pamiętasz hasła?
            </h2>

            <p class="mt-4 text-[20px] leading-[1.45] text-white/70">
                Podaj adres email — wyślemy link do ustawienia nowego.
            </p>

            <form id="forgotPasswordForm" class="mt-6">
                <input
                    id="forgotPasswordEmail"
                    type="email"
                    placeholder="EMAIL"
                    class="h-[56px] w-full rounded-[2px] border-0 bg-white px-4 text-[16px] text-[#8B8B8B] outline-none"
                />

                <button
                    type="submit"
                    class="mt-6 h-[56px] w-full rounded-[12px] border border-white/50 bg-transparent text-[18px] font-medium text-white transition hover:bg-white/5"
                >
                    Wyślij link resetujący
                </button>

                <button
                    id="backToLoginFromForgot"
                    type="button"
                    class="mt-5 block w-full text-center text-[16px] text-[#9C8CFF] transition hover:underline"
                >
                    Wróć do logowania
                </button>
            </form>
        </div>
    </div>
</div>
