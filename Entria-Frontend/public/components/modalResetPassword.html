<div id="resetPasswordModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 px-4 py-10 backdrop-blur-sm">
    <div class="w-full max-w-[1000px] rounded-[32px] bg-[#0F1016] px-[44px] py-[40px] shadow-[0_0_80px_rgba(0,0,0,0.45)]">
        <div class="mx-auto w-full max-w-[720px]">
            <h2 class="text-[56px] font-[Fraunces] font-semibold leading-none text-white">
                Ustaw nowe hasło
            </h2>

            <p class="mt-4 text-[20px] leading-[1.45] text-white/70">
                Link jest ważny przez 30 minut. Po jego użyciu wygaśnie.
            </p>

            <form id="resetPasswordForm" class="mt-6">
                <div class="space-y-6">
                    <div class="relative">
                        <input
                            id="newPassword"
                            type="password"
                            placeholder="NOWE HASŁO&#10;Min. 8 znaków"
                            class="h-[56px] w-full rounded-[2px] border-0 bg-white px-4 pr-14 text-[16px] text-[#8B8B8B] outline-none placeholder:text-[#8B8B8B]"
                        />
                        <button
                            type="button"
                            id="toggleNewPassword"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-[#1E1E1E]/80"
                        >
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>

                    <div class="relative">
                        <input
                            id="confirmNewPassword"
                            type="password"
                            placeholder="POTWIERDŹ HASŁO&#10;Powtórz hasło"
                            class="h-[56px] w-full rounded-[2px] border-0 bg-white px-4 pr-14 text-[16px] text-[#8B8B8B] outline-none placeholder:text-[#8B8B8B]"
                        />
                        <button
                            type="button"
                            id="toggleConfirmPassword"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-[#1E1E1E]/80"
                        >
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button
                    type="submit"
                    class="mt-8 h-[56px] w-full rounded-[12px] border border-white/50 bg-transparent text-[18px] font-medium text-white transition hover:bg-white/5"
                >
                    Zapisz nowe hasło
                </button>
            </form>
        </div>
    </div>
</div>
